<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora‑X‑Millares</title>

<style>
    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #000;
        font-family: Calibri, sans-serif;
        color: white;
        padding: 20px;
        box-sizing: border-box;
    }

    .card {
        background-color: #111;
        padding: 30px;
        border-radius: 12px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 0 25px rgba(255,255,255,0.08);
    }

    h2 {
        text-align: center;
        margin-bottom: 25px;
        font-size: 22px;
    }

    label {
        font-size: 15px;
    }

    input, select {
        width: 100%;
        padding: 12px;
        margin-top: 6px;
        margin-bottom: 18px;
        border-radius: 8px;
        border: none;
        background-color: #222;
        color: white;
        font-size: 16px; /* evita zoom en iPhone */
        box-sizing: border-box;
    }

    button {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 8px;
        background-color: white;
        color: black;
        font-weight: bold;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:active {
        transform: scale(0.98);
    }

    #resultado {
        margin-top: 20px;
        text-align: center;
        font-size: 18px;
        font-weight: bold;
    }

    #detalle {
        margin-top: 20px;
        font-size: 14px;
        color: #ccc;
        line-height: 1.7;
        border-top: 1px solid #333;
        padding-top: 15px;
        word-wrap: break-word;
    }
</style>
</head>

<body>

<div class="card">
    <h2>Calculadora‑X‑Millares</h2>

    <label>Moneda</label>
    <select id="moneda">
        <option value="CRC">Colón Costarricense (₡)</option>
        <option value="USD">Dólar Americano ($)</option>
    </select>

    <label>Precio base</label>
    <input type="number" id="precio" inputmode="decimal">

    <label>Cantidad de etiquetas</label>
    <input type="number" id="cantidad" inputmode="numeric">

    <label>Impuesto (%)</label>
    <input type="number" id="impuesto" value="13" inputmode="decimal">

    <button onclick="calcular()">Calcular</button>

    <div id="resultado"></div>
    <div id="detalle"></div>
</div>

<script>
function formatoMoneda(valor, moneda) {
    return new Intl.NumberFormat(
        moneda === "CRC" ? "es-CR" : "en-US",
        { style: "currency", currency: moneda }
    ).format(valor);
}

function calcular() {
    let moneda = document.getElementById("moneda").value;
    let precio = parseFloat(document.getElementById("precio").value);
    let cantidad = parseFloat(document.getElementById("cantidad").value);
    let impuestoPorcentaje = parseFloat(document.getElementById("impuesto").value);

    if (isNaN(precio) || isNaN(cantidad) || isNaN(impuestoPorcentaje) || cantidad === 0) {
        document.getElementById("resultado").innerHTML = "Ingrese valores válidos.";
        document.getElementById("detalle").innerHTML = "";
        return;
    }

    let impuesto = impuestoPorcentaje / 100;
    let factorImpuesto = 1 + impuesto;

    let montoImpuesto = precio * impuesto;
    let precioTotal = precio * factorImpuesto;
    let costoUnitario = precioTotal / cantidad;

    document.getElementById("resultado").innerHTML =
        "Costo por etiqueta: " + formatoMoneda(costoUnitario, moneda);

    document.getElementById("detalle").innerHTML =
        "<strong>¿Cómo se realizó el cálculo?</strong><br><br>" +
        "1. Precio base: " + formatoMoneda(precio, moneda) + "<br>" +
        "2. Impuesto aplicado (" + impuestoPorcentaje + "%): " + formatoMoneda(montoImpuesto, moneda) + "<br>" +
        "3. Precio total con impuesto: " + formatoMoneda(precioTotal, moneda) + "<br>" +
        "4. División de etiqueta: " + formatoMoneda(precioTotal, moneda) +
        " ÷ " + cantidad + "<br><br>" +
        "<strong>Fórmula completa:</strong><br>" +
        "(Precio base × " + factorImpuesto.toFixed(2) + ") ÷ Cantidad<br><br>" +
        "(" + precio + " × " + factorImpuesto.toFixed(2) + ") ÷ " + cantidad +
        " = " + formatoMoneda(costoUnitario, moneda);
}
</script>

</body>
</html>
