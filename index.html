<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora</title>

<style>
:root {
    --bg: #000;
    --text: #ffffff;
    --muted: #6e6e73;
    --line: #1d1d1f;
}

body {
    margin: 0;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 32px;
    box-sizing: border-box;
}

/* Transición general */
.container {
    width: 100%;
    max-width: 380px;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.5s ease, transform 0.5s ease;
}

.container.visible {
    opacity: 1;
    transform: translateY(0);
}

.title {
    font-size: 26px;
    font-weight: 500;
    text-align: center;
    margin-bottom: 56px;
}

label {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
    display: block;
}

input, select {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--line);
    padding: 12px 0;
    margin-bottom: 28px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: border-color 0.25s ease;
}

input:focus, select:focus {
    border-bottom: 1px solid #ffffff;
}

button {
    width: 100%;
    background: none;
    border: 1px solid var(--line);
    color: var(--text);
    padding: 14px;
    font-size: 14px;
    cursor: pointer;
    transition: border-color 0.25s ease;
}

button:hover {
    border-color: #ffffff;
}

/* Warning minimal */
#warning {
    margin-top: 12px;
    font-size: 13px;
    color: var(--muted);
    opacity: 0;
    transition: opacity 0.3s ease;
}

#warning.show {
    opacity: 1;
}

#resultado {
    margin-top: 36px;
    font-size: 16px;
    font-weight: 500;
}

#detalle {
    margin-top: 28px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.8;
    white-space: pre-line;
}

/* Idioma */
.language-switch {
    position: fixed;
    bottom: 24px;
    right: 28px;
    font-size: 12px;
    color: var(--muted);
}

.language-switch span {
    cursor: pointer;
    opacity: 0.4;
    transition: opacity 0.2s ease;
}

.language-switch span.active {
    opacity: 1;
    color: var(--text);
}

.divider {
    margin: 0 6px;
    opacity: 0.2;
}
</style>
</head>

<body>

<div class="container" id="container">

    <h1 class="title" id="titulo">Calculadora</h1>

    <label id="lblMoneda">Moneda</label>
    <select id="moneda">
        <option value="CRC">CRC (₡)</option>
        <option value="USD">USD ($)</option>
    </select>

    <label id="lblPrecio">Precio base</label>
    <input type="number" id="precio">

    <label id="lblCantidad">Cantidad</label>
    <input type="number" id="cantidad">

    <label id="lblImpuesto">Impuesto (%)</label>
    <input type="number" id="impuesto" value="13">

    <button onclick="calcular()" id="btnCalcular">Calcular</button>

    <div id="warning"></div>

    <div id="resultado"></div>
    <div id="detalle"></div>

</div>

<div class="language-switch">
    <span id="esBtn" onclick="setIdioma('es')">ES</span>
    <span class="divider">/</span>
    <span id="enBtn" onclick="setIdioma('en')">EN</span>
</div>

<script>
let idiomaActual = "es";
let warningTimeout;

function showContainer() {
    setTimeout(() => {
        container.classList.add("visible");
    }, 50);
}

function fadeLanguageChange(callback) {
    container.classList.remove("visible");
    setTimeout(() => {
        callback();
        container.classList.add("visible");
    }, 250);
}

function detectarIdioma() {
    const lang = navigator.language || "";
    idiomaActual = lang.startsWith("en") ? "en" : "es";
    actualizarIdioma();
    showContainer();
}

function setIdioma(idioma) {
    fadeLanguageChange(() => {
        idiomaActual = idioma;
        actualizarIdioma();
    });
}

function actualizarIdioma() {
    esBtn.classList.remove("active");
    enBtn.classList.remove("active");
    document.getElementById(idiomaActual + "Btn").classList.add("active");

    if (idiomaActual === "es") {
        titulo.innerText = "Calculadora";
        lblMoneda.innerText = "Moneda";
        lblPrecio.innerText = "Precio base";
        lblCantidad.innerText = "Cantidad";
        lblImpuesto.innerText = "Impuesto (%)";
        btnCalcular.innerText = "Calcular";
    } else {
        titulo.innerText = "Calculator";
        lblMoneda.innerText = "Currency";
        lblPrecio.innerText = "Base price";
        lblCantidad.innerText = "Quantity";
        lblImpuesto.innerText = "Tax (%)";
        btnCalcular.innerText = "Calculate";
    }

    resultado.innerHTML = "";
    detalle.innerHTML = "";
    warning.innerHTML = "";
}

function mostrarWarning() {
    warning.innerText = idiomaActual === "es"
        ? "Complete los campos requeridos."
        : "Please complete required fields.";

    warning.classList.add("show");

    clearTimeout(warningTimeout);
    warningTimeout = setTimeout(() => {
        warning.classList.remove("show");
    }, 2500);
}

function formatoMoneda(valor, moneda) {
    return new Intl.NumberFormat(
        moneda === "CRC" ? "es-CR" : "en-US",
        { style: "currency", currency: moneda }
    ).format(valor);
}

function calcular() {
    const moneda = document.getElementById("moneda").value;
    const precio = parseFloat(document.getElementById("precio").value);
    const cantidad = parseFloat(document.getElementById("cantidad").value);
    const impuestoPorcentaje = parseFloat(document.getElementById("impuesto").value);

    if (!precio || !cantidad) {
        mostrarWarning();
        return;
    }

    const impuesto = impuestoPorcentaje / 100;
    const factor = 1 + impuesto;
    const total = precio * factor;
    const costo = total / cantidad;
    const impuestoMonto = precio * impuesto;

    resultado.innerHTML =
        (idiomaActual === "es"
            ? "Costo por etiqueta: "
            : "Cost per label: ")
        + formatoMoneda(costo, moneda);

    detalle.innerHTML =
`<strong>${idiomaActual === "es" ? "¿Cómo se realizó el cálculo?" : "How was the calculation done?"}</strong>

1. ${idiomaActual === "es" ? "Precio base" : "Base price"}: ${formatoMoneda(precio, moneda)}
2. ${idiomaActual === "es" ? "Impuesto aplicado" : "Applied tax"} (${impuestoPorcentaje}%): ${formatoMoneda(impuestoMonto, moneda)}
3. ${idiomaActual === "es" ? "Precio total con impuesto" : "Total with tax"}: ${formatoMoneda(total, moneda)}
4. ${idiomaActual === "es" ? "División de etiqueta" : "Division"}: ${formatoMoneda(total, moneda)} ÷ ${cantidad}

<strong>${idiomaActual === "es" ? "Fórmula completa:" : "Full formula:"}</strong>
(${idiomaActual === "es" ? "Precio base" : "Price"} × ${factor.toFixed(2)}) ÷ ${idiomaActual === "es" ? "Cantidad" : "Quantity"}

(${precio} × ${factor.toFixed(2)}) ÷ ${cantidad} = ${formatoMoneda(costo, moneda)}`;
}

detectarIdioma();
</script>

</body>
</html>
