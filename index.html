<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora</title>

<style>
:root {
    --bg: #000;
    --text: #ffffff;
    --muted: #6e6e73;
    --line: #1d1d1f;
}

body {
    margin: 0;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 32px;
    box-sizing: border-box;
}

.container {
    width: 100%;
    max-width: 380px;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.6s ease, transform 0.6s ease;
}

.container.loaded {
    opacity: 1;
    transform: translateY(0);
}

.title {
    font-size: 26px;
    font-weight: 500;
    text-align: center;
    margin-bottom: 56px;
}

label {
    font-size: 13px;
    color: var(--muted);
    display: block;
    margin-bottom: 6px;
}

input, select {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--line);
    padding: 12px 0;
    margin-bottom: 28px;
    color: var(--text);
    font-size: 15px;
    outline: none;
}

input:focus, select:focus {
    border-bottom: 1px solid #ffffff;
}

button {
    width: 100%;
    background: none;
    border: 1px solid var(--line);
    color: var(--text);
    padding: 14px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.25s ease;
}

button:hover {
    border-color: #ffffff;
}

#warning {
    font-size: 12px;
    color: var(--muted);
    margin-top: 12px;
    opacity: 0;
    transition: opacity 0.3s ease;
}

#warning.visible {
    opacity: 1;
}

#resultado {
    margin-top: 36px;
    font-size: 16px;
    font-weight: 500;
}

#detalle {
    margin-top: 28px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.8;
    white-space: pre-line;
}

.language-switch {
    position: fixed;
    bottom: 24px;
    right: 28px;
    font-size: 12px;
    letter-spacing: 1px;
    color: var(--muted);
}

.language-switch span {
    cursor: pointer;
    opacity: 0.4;
    transition: opacity 0.2s ease;
}

.language-switch span.active {
    opacity: 1;
    color: var(--text);
}

.divider {
    margin: 0 6px;
    opacity: 0.2;
}
</style>
</head>

<body>

<div class="container" id="container">

    <h1 class="title" id="titulo">Calculadora</h1>

    <label id="lblMoneda">Moneda</label>
    <select id="moneda">
        <option value="CRC">CRC (₡)</option>
        <option value="USD">USD ($)</option>
    </select>

    <label id="lblPrecio">Precio (incluye impuesto)</label>
    <input type="number" id="precio">

    <label id="lblCantidad">Cantidad</label>
    <input type="number" id="cantidad">

    <button id="btnCalcular">Calcular</button>

    <div id="warning"></div>
    <div id="resultado"></div>
    <div id="detalle"></div>

</div>

<div class="language-switch">
    <span id="esBtn">ES</span>
    <span class="divider">/</span>
    <span id="enBtn">EN</span>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const container = document.getElementById("container");
    const titulo = document.getElementById("titulo");
    const lblMoneda = document.getElementById("lblMoneda");
    const lblPrecio = document.getElementById("lblPrecio");
    const lblCantidad = document.getElementById("lblCantidad");
    const btnCalcular = document.getElementById("btnCalcular");
    const resultado = document.getElementById("resultado");
    const detalle = document.getElementById("detalle");
    const warning = document.getElementById("warning");
    const esBtn = document.getElementById("esBtn");
    const enBtn = document.getElementById("enBtn");

    let idiomaActual = navigator.language.startsWith("en") ? "en" : "es";

    function redondear(valor) {
        return Math.round((valor + Number.EPSILON) * 100) / 100;
    }

    function actualizarIdioma() {
        esBtn.classList.toggle("active", idiomaActual === "es");
        enBtn.classList.toggle("active", idiomaActual === "en");

        if (idiomaActual === "es") {
            titulo.textContent = "Calculadora";
            lblMoneda.textContent = "Moneda";
            lblPrecio.textContent = "Precio (incluye impuesto)";
            lblCantidad.textContent = "Cantidad";
            btnCalcular.textContent = "Calcular";
        } else {
            titulo.textContent = "Calculator";
            lblMoneda.textContent = "Currency";
            lblPrecio.textContent = "Price (tax included)";
            lblCantidad.textContent = "Quantity";
            btnCalcular.textContent = "Calculate";
        }

        resultado.innerHTML = "";
        detalle.innerHTML = "";
    }

    function formatoMoneda(valor, moneda) {
        return new Intl.NumberFormat(
            moneda === "CRC" ? "es-CR" : "en-US",
            { style: "currency", currency: moneda }
        ).format(valor);
    }

    function mostrarWarning() {
        warning.textContent =
            idiomaActual === "es"
                ? "Complete los campos requeridos."
                : "Please complete the required fields.";

        warning.classList.add("visible");
        setTimeout(() => warning.classList.remove("visible"), 2500);
    }

    btnCalcular.addEventListener("click", function () {

        const moneda = document.getElementById("moneda").value;
        const precio = parseFloat(document.getElementById("precio").value);
        const cantidad = parseFloat(document.getElementById("cantidad").value);

        if (!precio || !cantidad) {
            mostrarWarning();
            return;
        }

        const millares = redondear(cantidad / 1000);
        const divisionInicial = redondear(precio / millares);
        const costo = redondear(divisionInicial / 1.13);

        resultado.innerHTML =
            (idiomaActual === "es"
                ? "Costo por millar (sin impuesto): "
                : "Cost per thousand (before tax): ")
            + formatoMoneda(costo, moneda);

        if (idiomaActual === "es") {

            detalle.innerHTML =
`<strong>¿Cómo se realizó el cálculo?</strong>

1. Conversión a millares: ${cantidad} ÷ 1000 = ${millares}
2. División inicial: ${precio} ÷ ${millares} = ${divisionInicial}
3. Eliminación del 13%: ÷ 1.13

<strong>Fórmula completa:</strong>
(Precio ÷ (Cantidad / 1000)) ÷ 1.13

(${precio} ÷ (${cantidad} / 1000)) ÷ 1.13 = ${formatoMoneda(costo, moneda)}`;

        } else {

            detalle.innerHTML =
`<strong>How was the calculation done?</strong>

1. Convert to thousands: ${cantidad} ÷ 1000 = ${millares}
2. Initial division: ${precio} ÷ ${millares} = ${divisionInicial}
3. Remove 13% tax: ÷ 1.13

<strong>Full formula:</strong>
(Price ÷ (Quantity / 1000)) ÷ Factor Impuesto

(${precio} ÷ (${cantidad} / 1000)) ÷ 1.13 = ${formatoMoneda(costo, moneda)}`;
        }

    });

    esBtn.addEventListener("click", () => { idiomaActual = "es"; actualizarIdioma(); });
    enBtn.addEventListener("click", () => { idiomaActual = "en"; actualizarIdioma(); });

    actualizarIdioma();
    setTimeout(() => container.classList.add("loaded"), 50);
});
</script>

</body>
</html>
